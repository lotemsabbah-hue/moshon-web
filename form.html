<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הזמנת שולחן - שיפודי מושון</title>

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#d4af37;
      --glass: rgba(0,0,0,0.52);
      --line: rgba(255,255,255,0.12);
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:'Heebo',sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    /* NAV (אותו סטייל) */
    nav{
      position:fixed;
      top:0; left:0; right:0;
      z-index:10;
      display:flex;
      direction:rtl;
      justify-content:space-between;
      align-items:center;
      padding:18px 60px;
      gap:18px;
    }
    .menu{
      display:flex;
      gap:30px;
      justify-content:flex-end;
      align-items:center;
      flex-wrap:wrap;
    }
    .menu a{
      text-decoration:none;
      color:#fff;
      font-weight:400;
      transition:.25s;
    }
    .menu a:hover{ color:var(--gold); }
    .cta-btn{
      border:1px solid var(--gold);
      padding:8px 18px;
      border-radius:4px;
    }
    .actions{
      display:flex;
      gap:12px;
      align-items:center;
      direction:ltr;
      flex-wrap:wrap;
    }
    .action-btn{
      background:#000;
      border:2px solid var(--gold);
      padding:10px 18px;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      border-radius:4px;
      transition:.25s;
      line-height:1;
      white-space:nowrap;
      cursor:pointer;
    }
    .action-btn:hover{ background:var(--gold); color:#000; }
    .action-btn.primary{ background:var(--gold); color:#000; }

    /* PAGE */
    .hero{
      min-height:100vh;
      background: url('hero.jpg') center/cover no-repeat;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:110px 20px 70px;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,0.80), rgba(0,0,0,0.55), rgba(0,0,0,0.88));
    }
    .wrap{
      position:relative;
      z-index:2;
      width:min(900px, 92%);
    }
    .header{
      text-align:center;
      margin-bottom:14px;
    }
    .header h1{
      font-family:'Secular One','Heebo',sans-serif;
      font-size:56px;
      color:var(--gold);
      letter-spacing:1px;
      text-shadow:0 10px 30px rgba(0,0,0,0.65);
      margin-bottom:10px;
    }
    .header p{
      font-size:18px;
      line-height:1.9;
      opacity:0.95;
    }

    .card{
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:18px;
      backdrop-filter: blur(4px);
      padding:28px 22px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
    }
    label{
      font-weight:800;
      font-size:14px;
      opacity:0.95;
    }
    input, select, textarea{
      background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.16);
      color:#fff;
      border-radius:10px;
      padding:12px 12px;
      font-family:inherit;
      font-size:16px;
      outline:none;
      transition:.2s;
    }
    input:focus, select:focus, textarea:focus{
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
    }
    textarea{ min-height:110px; resize:vertical; }

    .row2{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
      margin-top:14px;
    }

    .hint{
      margin-top:12px;
      font-size:14px;
      opacity:0.85;
      line-height:1.7;
      text-align:center;
    }

    .buttons{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      border-radius:10px;
      padding:12px 18px;
      font-weight:900;
      border:1px solid rgba(255,255,255,0.16);
      background:rgba(0,0,0,0.35);
      color:#fff;
      cursor:pointer;
      transition:.25s;
    }
    .btn:hover{ border-color: var(--gold); color: var(--gold); transform:translateY(-1px); }

    .btn.primary{
      background:var(--gold);
      color:#000;
      border-color: var(--gold);
    }
    .btn.primary:hover{ filter:brightness(1.05); }

    @media(max-width:1000px){
      nav{ padding:16px 18px; }
      .menu{ gap:18px; }
      .header h1{ font-size:42px; }
    }
    @media(max-width:720px){
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<nav>
  <div class="menu">
    <a class="nav-link" href="index.html#home">עמוד הבית</a>
    <a class="nav-link" href="index.html#about">אודות</a>
    <a class="nav-link" href="events.html">תפריט אירועים</a>
    <a class="nav-link" href="restaurant-menu.html">תפריט המסעדה</a>
    <a class="nav-link" href="#">תעודות כשרות</a>
    <a class="nav-link" href="#">גלריה</a>
    <a class="nav-link" href="contact.html">צור קשר</a>
  </div>

  <div class="actions">
    <a class="action-btn whatsapp" href="#">וואטסאפ</a>
    <a class="action-btn primary" href="form.html">הזמן שולחן/אירוע</a>
  </div>
</nav>

  <section class="hero">
    <div class="wrap">
      <div class="header">
        <h1>הזמנת שולחן</h1>
        <p>ממלאים פרטים, לוחצים “שלח הזמנה” — ואנחנו מקבלים הודעה בוואטסאפ.</p>
      </div>

      <div class="card">
        <form id="reservationForm">
          <div class="grid">
            <div class="field">
              <label for="fullName">שם מלא *</label>
              <input id="fullName" name="fullName" type="text" placeholder="לדוגמה: דנה לוי" required />
            </div>

            <div class="field">
              <label for="phone">טלפון *</label>
              <input id="phone" name="phone" type="tel" placeholder="05XXXXXXXX" required />
            </div>

            <div class="field">
              <label for="date">תאריך *</label>
              <input id="date" name="date" type="date" required />
            </div>

            <div class="field">
              <label for="time">שעה *</label>
              <input id="time" name="time" type="time" required />
            </div>

            <div class="field">
              <label for="people">כמות אנשים *</label>
              <select id="people" name="people" required>
                <option value="" selected disabled>בחר/י כמות</option>
                <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
                <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
                <option>16</option><option>17</option><option>18</option><option>19</option><option>20+</option>
              </select>
            </div>

            <div class="field">
              <label for="occasion">סיבה/אירוע (אופציונלי)</label>
              <input id="occasion" name="occasion" type="text" placeholder="יום הולדת / משפחתי / דייט..." />
            </div>
          </div>

          <div class="row2">
            <div class="field">
              <label for="notes">הערות (אופציונלי)</label>
              <textarea id="notes" name="notes" placeholder="כיסא תינוק / עגלה / אלרגיות / ישיבה בחוץ..."></textarea>
            </div>
          </div>

          <div class="buttons">
            <button class="btn primary" type="submit">שלח הזמנה בוואטסאפ</button>
            <button class="btn" type="button" onclick="window.location.href='index.html#home'">חזרה לעמוד הבית</button>
          </div>

          <div class="hint">
            * ההודעה נשלחת בוואטסאפ כהודעה מוכנה. לאחר שנפתח הוואטסאפ פשוט לוחצים “שליחה”.
          </div>
        </form>
      </div>
    </div>
  </section>

  <script>
    // 👉 החליפי למספר הוואטסאפ של העסק בפורמט בינלאומי (ללא + וללא 0 בתחילת הקידומת)
    // דוגמה: 972501234567
    const WHATSAPP_NUMBER = "PHONE_NUMBER";

    function pad2(n){ return String(n).padStart(2,'0'); }

    document.getElementById('reservationForm').addEventListener('submit', function(e){
      e.preventDefault();

      const name = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const people = document.getElementById('people').value;
      const occasion = document.getElementById('occasion').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if(!name || !phone || !date || !time || !people){
        alert("אנא מלא/י את כל השדות המסומנים בכוכבית.");
        return;
      }

      // תאריך יפה DD/MM/YYYY
      let niceDate = date;
      const parts = date.split('-');
      if(parts.length === 3){
        niceDate = `${pad2(parts[2])}/${pad2(parts[1])}/${parts[0]}`;
      }

      let msg =
`היי שיפודי מושון 👋
אשמח להזמין שולחן:

שם: ${name}
טלפון: ${phone}
תאריך: ${niceDate}
שעה: ${time}
כמות אנשים: ${people}`;

      if(occasion) msg += `\nסיבה/אירוע: ${occasion}`;
      if(notes) msg += `\nהערות: ${notes}`;

      msg += `\n\nתודה!`;

      if(WHATSAPP_NUMBER === "PHONE_NUMBER"){
        alert("חסר מספר וואטסאפ בדף. החליפי את PHONE_NUMBER למספר העסק בפורמט בינלאומי.");
        return;
      }

      const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
      window.open(url, "_blank");
    });
  </script>

</body>
</html>
