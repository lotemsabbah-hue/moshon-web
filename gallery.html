<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>גלריה - שיפודי מושון</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Secular+One&display=swap" rel="stylesheet">

<style>
:root{ --gold:#d4af37; }

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:#000;color:#fff;overflow-x:hidden;}

/* ===== NAV ===== */
nav{
position:fixed;top:0;left:0;right:0;z-index:50;
display:flex;direction:rtl;justify-content:space-between;align-items:center;
padding:18px 60px;gap:18px;
background:rgba(0,0,0,0.55);
backdrop-filter: blur(6px);
}
.menu{display:flex;gap:30px;align-items:center;flex-wrap:wrap;}
.menu a{
text-decoration:none;color:#fff;font-weight:400;transition:.25s;
position:relative;padding:8px 18px;border-radius:4px;
}
.menu a:hover{color:var(--gold);}
.menu a.active::after{
content:"";position:absolute;inset:0;border:1px solid var(--gold);
border-radius:4px;pointer-events:none;
}
.actions{display:flex;gap:12px;align-items:center;direction:ltr;flex-wrap:wrap;}
.action-btn{
background:#000;border:2px solid var(--gold);
padding:10px 18px;text-decoration:none;color:#fff;
font-weight:800;border-radius:4px;transition:.25s;line-height:1;white-space:nowrap;
}
.action-btn:hover{background:var(--gold);color:#000;}
.action-btn.primary{background:var(--gold);color:#000;}

/* ===== MOBILE NAV (doesn't affect desktop) ===== */
.nav-toggle{
display:none;
background:transparent;
border:1px solid rgba(212,175,55,0.7);
color:#fff;
border-radius:10px;
padding:10px 12px;
font-weight:900;
line-height:1;
cursor:pointer;
}

@media (max-width: 900px){
nav{padding:14px 14px !important; gap:12px !important;}
.nav-toggle{ display:inline-flex; }

.menu{
display:none !important;
width:100%;
gap:10px !important;
padding-top:10px;
}

nav.open .menu{
display:flex !important;
flex-direction:column;
align-items:stretch;
background:rgba(0,0,0,0.72);
border:1px solid rgba(255,255,255,0.10);
border-radius:14px;
padding:12px;
margin-top:10px;
max-height:calc(100vh - 90px);
overflow:auto;
-webkit-overflow-scrolling: touch;
}

nav.open .menu a{
width:100%;
text-align:right;
padding:12px 14px;
background:rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.10);
border-radius:12px;
}

.actions{
gap:8px !important;
flex-wrap:nowrap !important;
}
.action-btn{
padding:9px 10px !important;
font-size:13px !important;
}

.menu a.active::after{
inset:0;
border-radius:12px;
}
}

@media (max-width: 420px){
.action-btn{ padding:8px 9px !important; font-size:12px !important; }
}

/* ===== PAGE ===== */
.page{
min-height:100vh;
padding:140px 20px 80px;
display:flex;
justify-content:center;
position:relative;
background:url('gallery.jpg') center/cover no-repeat;
}

.page::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,
rgba(0,0,0,.80),
rgba(0,0,0,.55),
rgba(0,0,0,.88));
}

.wrap{
position:relative;
z-index:2;
width:min(1200px,92%);
}

/* ===== HEADER ===== */
.header{text-align:center;margin-bottom:40px;}

.header h1{
font-family:'Secular One';
font-size:56px;
color:var(--gold);
margin-bottom:15px;
text-shadow:0 10px 30px rgba(0,0,0,0.65);
}

.subtitle{
font-size:18px;
line-height:1.9;
opacity:0.95;
max-width:720px;
margin:0 auto;
}

/* ===== GALLERY ===== */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.frame{
border-radius:16px;
overflow:hidden;
border:2px solid var(--gold);
cursor:pointer;
transition:.25s;
background:#000;
}

.frame img{
width:100%;
height:280px;
object-fit:cover;
display:block;
transition:.25s;
}

.frame:hover{
transform:translateY(-3px);
}
.frame:hover img{
transform:scale(1.05);
}

@media(max-width:900px){
.gallery{grid-template-columns:repeat(2,1fr);}
.header h1{font-size:42px;}
}

@media(max-width:600px){
.gallery{grid-template-columns:1fr;}
.frame img{height:240px;}
.header h1{font-size:34px;}
.subtitle{font-size:16px;}
}

/* ===== LIGHTBOX ===== */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:999;
}

.lightbox.active{
opacity:1;
pointer-events:auto;
}

.lightbox img{
max-width:90%;
max-height:85%;
border-radius:12px;
border:3px solid var(--gold);
}

.close,.prev,.next{
position:absolute;
color:#fff;
cursor:pointer;
}

.close{top:30px;right:40px;font-size:32px;}
.prev{left:40px;top:50%;transform:translateY(-50%);font-size:40px;}
.next{right:40px;top:50%;transform:translateY(-50%);font-size:40px;}

.prev:hover,.next:hover,.close:hover{
color:var(--gold);
}
</style>
</head>

<body>

<nav id="siteNav">
  <button class="nav-toggle" type="button" aria-label="פתח תפריט" aria-expanded="false">☰</button>

  <div class="menu">
    <a class="nav-link" href="index.html#home">עמוד הבית</a>
    <a class="nav-link" href="about.html">אודות</a>
    <a class="nav-link" href="events.html">תפריט אירועים</a>
    <a class="nav-link" href="restaurant-menu.html">תפריט המסעדה</a>
    <a class="nav-link" href="#">תעודות כשרות</a>
    <a class="nav-link active" href="gallery.html">גלריה</a>
    <a class="nav-link" href="contact.html">צור קשר</a>
  </div>

  <div class="actions">
    <a class="action-btn primary" href="form.html">הזמן שולחן/אירוע</a>
  </div>
</nav>

<section class="page">
<div class="wrap">

<div class="header">
<h1>גלריה</h1>
<p class="subtitle">
רגעים של אש, טעם ואווירה — ככה נראית חוויה שמתחילה בגריל ונגמרת בחיוך.
</p>
</div>

<div class="gallery">
<div class="frame"><img src="g1.jpg"></div>
<div class="frame"><img src="g2.jpg"></div>
<div class="frame"><img src="g3.jpg"></div>
<div class="frame"><img src="g4.jpg"></div>
<div class="frame"><img src="g5.jpg"></div>
<div class="frame"><img src="g6.jpg"></div>
</div>

</div>
</section>

<div class="lightbox" id="lightbox">
<span class="close">&times;</span>
<span class="prev">&#10094;</span>
<img id="lightbox-img">
<span class="next">&#10095;</span>
</div>

<script>
(function(){
  const nav = document.getElementById('siteNav');
  const btn = nav ? nav.querySelector('.nav-toggle') : null;

  function setExpanded(open){
    if(!btn) return;
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  if(btn && nav){
    btn.addEventListener('click', function(){
      nav.classList.toggle('open');
      setExpanded(nav.classList.contains('open'));
    });

    // close after clicking a link (mobile)
    nav.querySelectorAll('.menu a').forEach(a=>{
      a.addEventListener('click', ()=>{
        if(window.innerWidth <= 900){
          nav.classList.remove('open');
          setExpanded(false);
        }
      });
    });

    // close on resize to desktop
    window.addEventListener('resize', ()=>{
      if(window.innerWidth > 900){
        nav.classList.remove('open');
        setExpanded(false);
      }
    });
  }
})();

const images=document.querySelectorAll(".frame img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");
const closeBtn=document.querySelector(".close");
const prevBtn=document.querySelector(".prev");
const nextBtn=document.querySelector(".next");

let currentIndex=0;

function showImage(index){
currentIndex=index;
lightboxImg.src=images[index].src;
lightbox.classList.add("active");
}

images.forEach((img,index)=>{
img.addEventListener("click",()=>showImage(index));
});

closeBtn.onclick=()=>lightbox.classList.remove("active");

lightbox.onclick=(e)=>{
if(e.target===lightbox) lightbox.classList.remove("active");
};

prevBtn.onclick=(e)=>{
e.stopPropagation();
currentIndex=(currentIndex-1+images.length)%images.length;
showImage(currentIndex);
};

nextBtn.onclick=(e)=>{
e.stopPropagation();
currentIndex=(currentIndex+1)%images.length;
showImage(currentIndex);
};
</script>

</body>
</html>
