<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>שיפודי מושון - גריל בר בשרים</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&display=swap" rel="stylesheet"/>

<style>
:root{ --gold:#d4af37; }
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Heebo',sans-serif;background:#000;color:#fff;overflow-x:hidden;}

/* ===== NAV ===== */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  padding:18px 60px;
}

.nav-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
}

.menu a{
  text-decoration:none;
  color:#fff;
  padding:8px 16px;
  border-radius:6px;
  transition:.25s;
  position:relative;
}

.menu a:hover{color:var(--gold);}

.menu a.active::after{
  content:"";
  position:absolute;
  inset:0;
  border:1px solid var(--gold);
  border-radius:6px;
}

.actions{
  display:flex;
  gap:10px;
  direction:ltr;
}

.action-btn{
  border:2px solid var(--gold);
  padding:9px 14px;
  font-weight:800;
  border-radius:6px;
  text-decoration:none;
  color:#fff;
  transition:.25s;
}

.action-btn:hover{background:var(--gold);color:#000;}
.action-btn.primary{background:var(--gold);color:#000;}

.nav-toggle{
  display:none;
  background:none;
  border:1px solid var(--gold);
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  font-weight:900;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  background:url('hero.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.8), rgba(0,0,0,.3), rgba(0,0,0,.85));
}
.hero-center{
  position:relative;
  z-index:2;
  text-align:center;
}
.hero-center h1{
  font-family:'Secular One';
  font-size:80px;
  color:var(--gold);
}
.hero-center p{
  font-size:22px;
  margin-top:10px;
}

/* ===== MOBILE ===== */
@media(max-width:900px){

  nav{padding:14px 16px;}

  .nav-toggle{display:block;}

  .menu{
    display:none;
    flex-direction:column;
    background:rgba(0,0,0,.85);
    padding:15px;
    border-radius:12px;
    margin-top:12px;
  }

  nav.open .menu{display:flex;}

  .menu a{
    width:100%;
    text-align:right;
    background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.1);
  }

  .hero-center h1{font-size:48px;}
  .hero-center p{font-size:18px;}
}
</style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <button class="nav-toggle">☰</button>

    <div class="menu">
      <a href="#home">עמוד הבית</a>
      <a href="#about">אודות</a>
      <a href="events.html">תפריט אירועים</a>
      <a href="restaurant-menu.html">תפריט המסעדה</a>
      <a href="contact.html">צור קשר</a>
    </div>

    <div class="actions">
      <a class="action-btn" href="#">וואטסאפ</a>
      <a class="action-btn primary" href="form.html">הזמן שולחן</a>
    </div>
  </div>
</nav>

<section class="hero" id="home">
  <div class="hero-center">
    <h1>שיפודי מושון</h1>
    <p>גריל בר בשרים</p>
  </div>
</section>

<script>
const nav=document.querySelector('nav');
document.querySelector('.nav-toggle')
  .addEventListener('click',()=>nav.classList.toggle('open'));
</script>

</body>
</html>
